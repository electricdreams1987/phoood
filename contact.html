<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>お問い合わせ | SIZZLE FOOD PHOTO</title>
<meta name="description" content="食品写真撮影スタジオへのお問い合わせフォームです。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF5EE;
    --paper-2:#F4E8D8;
    --card:#fff;
    --ink:#241B14;
    --ink-soft:#6E5F52;
    --ink-faint:#9B8A7B;
    --sizzle:#E64E1B;
    --ember:#C93C12;
    --blue:#1F6F8B;
    --line:rgba(36,27,20,.12);
    --line-strong:rgba(36,27,20,.22);
    --shadow:0 18px 40px -24px rgba(36,27,20,.45);
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Sans JP",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.75;
  }
  a{color:inherit;text-decoration:none}
  .text-link{color:var(--sizzle);font-weight:900;text-decoration:underline;text-underline-offset:.18em}
  .wrap{width:min(920px,100%);margin:0 auto;padding:0 24px}
  header{
    position:sticky;top:0;z-index:20;background:rgba(250,245,238,.9);
    border-bottom:1px solid var(--line);backdrop-filter:blur(10px);
  }
  .nav{height:72px;display:flex;align-items:center;justify-content:space-between;gap:20px}
  .back{
    display:inline-flex;align-items:center;gap:.45em;color:var(--ink-soft);
    font-size:.92rem;font-weight:700;transition:color .2s ease;
  }
  .back:hover{color:var(--sizzle)}
  .brand{font-family:"Anton",sans-serif;letter-spacing:.05em;font-size:1.42rem}
  .brand span{color:var(--sizzle)}
  main{padding:54px 0 72px}
  .hero{text-align:center;margin-bottom:34px}
  .eyebrow{
    display:inline-flex;align-items:center;justify-content:center;gap:.55em;color:var(--sizzle);
    font-size:.78rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  }
  .eyebrow::before,.eyebrow::after{content:"";display:inline-block;width:24px;height:2px;background:var(--sizzle)}
  h1{
    margin:.35em 0 .35em;font-size:clamp(2rem,4vw,3.2rem);
    line-height:1.24;font-weight:900;letter-spacing:.01em;
  }
  .hero p{margin:0;color:var(--ink-soft);font-size:1rem}
  .form-card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    box-shadow:var(--shadow);padding:34px;
  }
  form{display:grid;gap:22px}
  .field{display:grid;gap:8px}
  label{font-weight:900;line-height:1.45}
  .req{
    display:inline-flex;margin-left:.45em;padding:.15em .55em;border-radius:999px;
    background:rgba(230,78,27,.1);color:var(--sizzle);font-size:.7rem;font-weight:900;
    vertical-align:middle;
  }
  .optional{
    display:inline-flex;margin-left:.45em;color:var(--ink-faint);font-size:.76rem;font-weight:700;
  }
  input[type="text"],input[type="email"],input[type="tel"],textarea{
    width:100%;border:1px solid var(--line-strong);border-radius:12px;background:#fff;
    color:var(--ink);font:inherit;font-weight:500;padding:13px 14px;
    transition:border-color .2s ease, box-shadow .2s ease;
  }
  input[type="text"],input[type="email"],input[type="tel"]{height:50px}
  textarea{min-height:170px;resize:vertical}
  input:focus,textarea:focus{
    outline:none;border-color:var(--sizzle);box-shadow:0 0 0 4px rgba(230,78,27,.14);
  }
  .hint{margin:0;color:var(--ink-faint);font-size:.82rem}
  .checks{
    display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;
    padding:16px;border:1px solid var(--line);border-radius:14px;background:#FFFDF9;
  }
  .check{
    display:flex;align-items:flex-start;gap:10px;font-weight:700;color:var(--ink-soft);
    line-height:1.55;
  }
  input[type="checkbox"]{
    width:18px;height:18px;margin:.23em 0 0;accent-color:var(--sizzle);flex:none;
  }
  .privacy{
    padding:18px;border:1px solid var(--line);border-radius:14px;background:var(--paper);
  }
  .privacy .check{color:var(--ink);font-weight:900}
  .submit-row{display:flex;justify-content:center;margin-top:8px}
  button{
    display:inline-flex;align-items:center;justify-content:center;border:0;border-radius:999px;
    min-width:240px;padding:1em 1.6em;background:var(--sizzle);color:#fff;
    font:inherit;font-weight:900;cursor:pointer;box-shadow:0 12px 26px -14px rgba(230,78,27,.75);
    transition:background .2s ease, transform .2s ease, box-shadow .2s ease;
  }
  button:hover{background:var(--ember);transform:translateY(-2px);box-shadow:0 16px 30px -16px rgba(230,78,27,.9)}
  button:active{transform:translateY(0)}
  .foot-note{
    margin:22px 0 0;text-align:center;color:var(--ink-faint);font-size:.82rem;
  }
  @media(max-width:720px){
    main{padding:38px 0 56px}
    .wrap{padding:0 18px}
    .nav{height:66px}
    .brand{font-size:1.12rem}
    .back{font-size:.84rem}
    .form-card{padding:24px 20px}
    .checks{grid-template-columns:1fr;padding:14px}
    .submit-row{display:block}
    button{width:100%;min-width:0}
  }
</style>
</head>
<body>
<header>
  <div class="wrap nav">
    <a class="back" href="index.html">← トップページに戻る</a>
    <a class="brand" href="index.html">SIZZLE<span>.</span>FOOD PHOTO</a>
  </div>
</header>

<main>
  <div class="wrap">
    <section class="hero">
      <span class="eyebrow">Contact</span>
      <h1>お問い合わせ</h1>
      <p>撮影内容やご検討中のプランについて、お気軽にご相談ください。</p>
    </section>

    <section class="form-card" aria-label="お問い合わせフォーム">
      <form action="#" method="post">
        <div class="field">
          <label for="company">会社名・団体名<span class="req">必須</span></label>
          <input type="text" id="company" name="company" autocomplete="organization" required>
        </div>

        <div class="field">
          <label for="name">お名前<span class="req">必須</span></label>
          <input type="text" id="name" name="name" autocomplete="name" required>
        </div>

        <div class="field">
          <label for="email">メールアドレス<span class="req">必須</span></label>
          <input type="email" id="email" name="email" autocomplete="email" required>
        </div>

        <div class="field">
          <label for="tel">電話番号<span class="optional">任意</span></label>
          <input type="tel" id="tel" name="tel" autocomplete="tel">
        </div>

        <div class="field">
          <label>ご検討中のプラン<span class="req">必須</span></label>
          <div class="checks">
            <label class="check"><input type="checkbox" name="plans[]" value="AI背景合成プラン">プラン1：AI背景合成プラン</label>
            <label class="check"><input type="checkbox" name="plans[]" value="切り抜き商品プラン（背景なし）">プラン2：切り抜き商品プラン（背景なし）</label>
            <label class="check"><input type="checkbox" name="plans[]" value="フードコーディネータープラン">プラン3：フードコーディネータープラン</label>
            <label class="check"><input type="checkbox" name="plans[]" value="食品形態撮影">プラン4：食品形態撮影</label>
            <label class="check"><input type="checkbox" name="plans[]" value="その他">その他（相談して決めたい）</label>
          </div>
          <p class="hint">複数選択できます。</p>
        </div>

        <div class="field">
          <label for="cuts">撮影予定のアイテム数・カット数<span class="optional">任意</span></label>
          <input type="text" id="cuts" name="cuts" placeholder="例：約5商品で合計15カット">
        </div>

        <div class="field">
          <label for="message">お問い合わせ内容<span class="req">必須</span></label>
          <textarea id="message" name="message" placeholder="ご要望、撮影したい食品の種類、希望の納期などをご記入ください。" required></textarea>
        </div>

        <div class="privacy">
          <label class="check">
            <input type="checkbox" name="privacy" value="同意する" required>
            <span><a class="text-link" href="privacy.html" target="_blank" rel="noopener">プライバシーポリシー</a>に同意する</span>
          </label>
        </div>

        <div class="submit-row">
          <button type="submit">この内容で送信する</button>
        </div>
      </form>
    </section>

    <p class="foot-note">送信先は後からシステム連携できるよう、現在は仮設定です。</p>
  </div>
</main>
<script>
  const planChecks = Array.from(document.querySelectorAll('input[name="plans[]"]'));

  function syncPlanRequired() {
    const hasChecked = planChecks.some((check) => check.checked);
    planChecks.forEach((check) => {
      check.required = !hasChecked;
    });
  }

  planChecks.forEach((check) => check.addEventListener("change", syncPlanRequired));
  syncPlanRequired();
</script>
</body>
</html>
