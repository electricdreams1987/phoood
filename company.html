<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>会社概要 | Phoood</title>
<meta name="description" content="株式会社インターセクトの会社概要です。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#FAF5EE;
    --card:#fff;
    --ink:#241B14;
    --ink-soft:#6E5F52;
    --ink-faint:#9B8A7B;
    --sizzle:#E64E1B;
    --line:rgba(36,27,20,.12);
    --shadow:0 18px 40px -24px rgba(36,27,20,.45);
  }
  *{box-sizing:border-box}
  body{
    margin:0;background:var(--paper);color:var(--ink);
    font-family:"Noto Sans JP",system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
    line-height:1.85;
  }
  a{color:inherit;text-decoration:none}
  .wrap{width:min(920px,100%);margin:0 auto;padding:0 24px}
  header{
    position:sticky;top:0;z-index:20;background:rgba(250,245,238,.9);
    border-bottom:1px solid var(--line);backdrop-filter:blur(10px);
  }
  .nav{height:72px;display:flex;align-items:center;justify-content:space-between;gap:20px}
  .back{
    display:inline-flex;align-items:center;gap:.45em;color:var(--ink-soft);
    font-size:.92rem;font-weight:700;transition:color .2s ease;
  }
  .back:hover{color:var(--sizzle)}
  .brand{display:inline-flex;align-items:baseline;gap:.42em;font-family:"Noto Sans JP",system-ui,sans-serif;letter-spacing:.01em;font-size:1.42rem;font-weight:900}
  .brand small{font-size:.52em;font-weight:800;letter-spacing:.12em;color:var(--ink-soft);text-transform:uppercase}
  .brand span{color:var(--sizzle)}
  main{padding:54px 0 72px}
  .hero{text-align:center;margin-bottom:34px}
  .eyebrow{
    display:inline-flex;align-items:center;justify-content:center;gap:.55em;color:var(--sizzle);
    font-size:.78rem;font-weight:900;letter-spacing:.12em;text-transform:uppercase;
  }
  .eyebrow::before,.eyebrow::after{content:"";display:inline-block;width:24px;height:2px;background:var(--sizzle)}
  h1{
    margin:.35em 0 .35em;font-size:clamp(2rem,4vw,3.2rem);
    line-height:1.24;font-weight:900;letter-spacing:.01em;
  }
  .hero p{margin:0;color:var(--ink-soft);font-size:1rem}
  .company-card{
    background:var(--card);border:1px solid var(--line);border-radius:18px;
    box-shadow:var(--shadow);padding:42px;
  }
  .company-table{display:grid;gap:0;border-top:1px solid var(--line)}
  .company-row{
    display:grid;grid-template-columns:180px 1fr;gap:28px;
    padding:22px 0;border-bottom:1px solid var(--line);
  }
  .company-row dt{margin:0;color:var(--ink);font-weight:900}
  .company-row dd{margin:0;color:var(--ink-soft);font-weight:500}
  .business-list{display:grid;gap:10px;margin:0;padding:0;list-style:none}
  .business-list li{padding-left:1.1em;text-indent:-1.1em}
  .business-list strong{color:var(--ink);font-weight:900}
  .foot-note{margin:28px 0 0;text-align:center;color:var(--ink-faint);font-size:.82rem}
  @media(max-width:720px){
    main{padding:38px 0 56px}
    .wrap{padding:0 18px}
    .nav{height:66px}
    .brand{font-size:1.12rem}
    .back{font-size:.84rem}
    .company-card{padding:26px 20px}
    .company-row{grid-template-columns:1fr;gap:6px;padding:18px 0}
  }
</style>
</head>
<body>
<header>
  <div class="wrap nav">
    <a class="back" href="index.html">← トップページに戻る</a>
    <a class="brand" href="index.html"><span>Phoood!!</span><small>Food Photo × AI</small></a>
  </div>
</header>

<main>
  <div class="wrap">
    <section class="hero">
      <span class="eyebrow">Company</span>
      <h1>会社概要</h1>
      <p>株式会社インターセクトの基本情報です。</p>
    </section>

    <section class="company-card" aria-label="会社概要">
      <dl class="company-table">
        <div class="company-row">
          <dt>社名</dt>
          <dd>株式会社インターセクト</dd>
        </div>
        <div class="company-row">
          <dt>所在地</dt>
          <dd>〒160-0007 東京都新宿区荒木町11-49</dd>
        </div>
        <div class="company-row">
          <dt>設立年月日</dt>
          <dd>1988年12月1日</dd>
        </div>
        <div class="company-row">
          <dt>資本金</dt>
          <dd>10,000,000円</dd>
        </div>
        <div class="company-row">
          <dt>代表者名</dt>
          <dd>大谷和也</dd>
        </div>
        <div class="company-row">
          <dt>事業内容</dt>
          <dd>
            <ul class="business-list">
              <li><strong>撮影</strong>（静止画・動画）</li>
              <li><strong>動画制作・デザイン制作</strong>（プロモーション企画・コンセプト立案を含む）</li>
              <li><strong>ウェブサイト制作</strong>（デザイン・コーディング・コンテンツ制作）</li>
              <li><strong>印刷物制作</strong>（デザイン・印刷対応）</li>
            </ul>
          </dd>
        </div>
      </dl>
    </section>

    <p class="foot-note">© <span id="yr"></span> 株式会社インターセクト</p>
  </div>
</main>
<script>
  document.getElementById("yr").textContent = new Date().getFullYear();
</script>
</body>
</html>
